schema_version: "1.0"

preset:
  id: "nested-repos"
  name: "Nested Repository Support"
  version: "1.0.0"
  description: "Adds multi-module nested repository support for independent repos and git submodules during plan and task phases."
  author: "sakitA"
  repository: "https://github.com/sakitA/spec-kit-preset-nested-repos"
  license: "MIT"

requires:
  speckit_version: ">=0.4.0"

provides:
  templates:
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Plan template with Affected Nested Repositories section"
      replaces: "plan-template"

    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Tasks template with Phase 0 nested repo branch setup"
      replaces: "tasks-template"

    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Plan command with nested repo discovery and analysis"
      replaces: "speckit.plan"

    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Tasks command with nested repo branch-creation task generation"
      replaces: "speckit.tasks"

tags:
  - "multi-module"
  - "nested-repos"
  - "submodules"
  - "monorepo"
